<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>Réia — Designer Worklist</title>
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@400;500;600&family=Lora&display=swap');
:root{--maroon:#7B0017;--ink:#15150e;--line:#e6dccb;--gold:#b78b2e;--paper:#f3ecdf;--done:#3f8f4f;--work:#b78b2e;--todo:#9a8f80;--block:#c0392b;--urgent:#c0392b;--high:#d77a2b;--normal:#6b7a8f;--low:#9aa7b0;}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:'Lora',Georgia,serif;}
.top{background:var(--maroon);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,.18);}
.top .tt{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;}
.top a{color:#ffd9a8;font-family:'Poppins',sans-serif;font-size:.76rem;text-decoration:none;margin-left:13px;}
.wrap{max-width:1320px;margin:0 auto;padding:18px 16px 80px;}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:4px 0 14px;font-family:'Poppins',sans-serif;font-size:.72rem;}
.chip{background:#faf4ea;border:1px solid var(--line);border-radius:18px;padding:6px 13px;cursor:pointer;color:#6b5f54;}
.chip.on{background:var(--maroon);color:#fff;border-color:var(--maroon);}
.muted{color:#8a7c6c;}
select.flt{background:#faf4ea;border:1px solid var(--line);border-radius:16px;padding:6px 10px;font-family:'Poppins',sans-serif;font-size:.7rem;}
.btn{font-family:'Poppins',sans-serif;font-size:.72rem;font-weight:600;border:none;border-radius:18px;padding:7px 14px;cursor:pointer;background:var(--gold);color:#1a1a12;}
.btn.alt{background:#faf4ea;color:var(--maroon);border:1px solid var(--line);}
.grp{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:var(--maroon);border-bottom:2px solid #e6cf9a;padding:14px 0 5px;margin-top:14px;display:flex;align-items:center;gap:8px;}
.grp .gn{font-family:'Poppins',sans-serif;font-size:.58rem;font-weight:600;color:#fff;background:var(--gold);border-radius:10px;padding:1px 8px;}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:8px;font-family:'Poppins',sans-serif;font-size:.72rem;}
th{background:#f3e9d6;color:#6b5f54;text-align:left;font-size:.58rem;text-transform:uppercase;letter-spacing:.05em;padding:8px 9px;border-bottom:1px solid var(--line);}
td{padding:8px 9px;border-bottom:1px solid #f0e8da;vertical-align:top;}
tr:last-child td{border-bottom:none;}
.thumb{width:44px;height:44px;object-fit:cover;border-radius:7px;border:1px solid var(--line);display:block;}
.nothumb{width:44px;height:44px;border-radius:7px;border:1px dashed var(--line);}
.bd{font-family:'Lora',serif;font-size:.8rem;color:var(--ink);max-width:240px;}
.use{font-family:'Lora',serif;font-size:.78rem;color:#5a4d44;max-width:220px;}
.brand{font-family:'Cormorant Garamond',serif;font-size:1.02rem;font-weight:700;color:var(--maroon);}
.mb{font-size:.52rem;font-weight:700;padding:1px 6px;border-radius:7px;color:#fff;}.mb-r{background:#7B0017;}.mb-s{background:#2f4d7a;}
.pill{font-size:.54rem;font-weight:700;padding:1px 7px;border-radius:9px;color:#fff;white-space:nowrap;}
.st-done{background:var(--done);}.st-work{background:var(--work);}.st-todo{background:var(--todo);}.st-block{background:var(--block);}
.pr-urgent{background:var(--urgent);}.pr-high{background:var(--high);}.pr-normal{background:var(--normal);}.pr-low{background:var(--low);}
.dz{font-family:'Poppins',sans-serif;font-size:.7rem;font-weight:600;color:var(--ink);}
.lnk{color:#2f4d7a;text-decoration:none;font-weight:600;}
.empty{text-align:center;color:#8a7c6c;font-family:'Poppins',sans-serif;padding:50px 10px;}
.setup{background:#fff;border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:0 12px 12px 0;padding:16px 20px;font-size:.9rem;}
@media print{.bar,.top a,.btn{display:none;}body{background:#fff;}.thumb,.nothumb{display:none;}}
</style></head><body>
<div class="top"><div class="tt">RÉIA — Designer Worklist</div><div><a href="index.html">← Hub</a><a href="review.html">🔔 Review</a><a href="board.html">📊 Board</a><a href="campaigns.html">🏷 Campaigns</a><a href="mywork.html">🧑‍🎨 My work</a><a href="shortlist.html">★ Finalised</a></div></div>
<div class="wrap">
<div class="bar">
  <span class="chip on" data-f="todo">To do</span>
  <span class="chip" data-f="no">To replicate</span>
  <span class="chip" data-f="in-progress">Replicating</span>
  <span class="chip" data-f="blocked">Not working</span>
  <span class="chip" data-f="done">Replicated ✓</span>
  <span class="chip" data-f="all">All</span>
  <select class="flt" id="fdz"><option value="all">All designers</option></select>
  <select class="flt" id="fpr"><option value="all">All priorities</option><option>Urgent</option><option>High</option><option>Normal</option><option>Low</option></select>
  <select class="flt" id="fgr"><option value="campaign">Group: campaign</option><option value="designer">Group: designer</option></select>
  <button class="btn" id="csv">⬇ CSV</button><button class="btn alt" id="print">🖨 Print</button>
  <span id="count" class="muted" style="margin-left:auto;"></span>
</div>
<div id="list"></div>
</div>
<script>
var BACKEND=(window.REIA_BACKEND||"").trim();
var FILTER="todo", FDZ="all", FPR="all", GROUP="campaign", DATA={};
var PRIOS=["Urgent","High","Normal","Low"];
function esc(s){return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function isReel(x){return (x.media||"").toLowerCase().indexOf("reel")>-1;}
function campOf(x){return (x.campaign&&(""+x.campaign).trim())?(""+x.campaign).trim():"Unassigned";}
function dzOf(x){return (x.designer&&(""+x.designer).trim())?(""+x.designer).trim():"Unassigned";}
function stg(r){r=r||"no";return r==="done"?'<span class="pill st-done">Replicated ✓</span>':(r==="in-progress"?'<span class="pill st-work">Replicating</span>':(r==="blocked"?'<span class="pill st-block">Not working</span>':'<span class="pill st-todo">To replicate</span>'));}
function pr(p){p=p||"Normal";return '<span class="pill pr-'+p.toLowerCase()+'">'+esc(p)+'</span>';}
function passFilter(x){var r=x.replicated||"no";if(FILTER==="todo")return r!=="done";if(FILTER==="all")return true;return r===FILTER;}
function prRank(p){var i=PRIOS.indexOf(p||"Normal");return i<0?2:i;}
function selected(){
  return Object.keys(DATA).map(function(k){return DATA[k];}).filter(passFilter)
   .filter(function(x){return FDZ==="all"||dzOf(x)===FDZ;})
   .filter(function(x){return FPR==="all"||(x.priority||"Normal")===FPR;})
   .sort(function(p,q){var g=GROUP==="designer"?dzOf:campOf;return g(p).localeCompare(g(q))||prRank(p.priority)-prRank(q.priority)||(p.brand||"").localeCompare(q.brand||"");});
}
function load(){
  if(!BACKEND){document.getElementById("list").innerHTML='<div class="setup"><b>Shared backend not connected.</b><br>Paste your /exec URL into <code>page_urls.json → backend_url</code> and re-run.</div>';return;}
  fetch(BACKEND).then(function(r){return r.json();}).then(function(j){DATA=(j&&j.shortlist)||{};var ppl=(j&&j.people)||{};fillDz(Object.keys(Object.assign({Jacob:1,Dishaba:1,Ashwanth:1,Prapanjj:1,Vasavi:1,Chittranjan:1},ppl)).sort());render();}).catch(function(){document.getElementById("list").innerHTML='<div class="empty">Could not reach the shared store.</div>';});
}
function fillDz(names){var s=document.getElementById("fdz");if(s.options.length>1)return;names.concat(["Unassigned"]).forEach(function(n){var o=document.createElement("option");o.textContent=n;s.appendChild(o);});}
function render(){
  var items=selected();
  document.getElementById("count").textContent=items.length+" creative"+(items.length===1?"":"s");
  var L=document.getElementById("list");
  if(!items.length){L.innerHTML='<div class="empty">Nothing in this view.</div>';return;}
  var gf=GROUP==="designer"?dzOf:campOf;
  var html="",curg=null;
  items.forEach(function(x){
    var g=gf(x);
    if(g!==curg){ if(curg!==null)html+='</tbody></table>'; curg=g;
      var cnt=items.filter(function(y){return gf(y)===g;}).length;
      html+='<div class="grp">'+(GROUP==="designer"?'🧑‍🎨 ':'🏷 ')+esc(g)+' <span class="gn">'+cnt+'</span></div>';
      html+='<table><thead><tr><th>Ref</th><th>Brand</th><th>Type</th><th>Designer</th><th>Priority</th><th>Stage</th><th>What to replicate</th><th>How we\'ll use it</th><th>Links</th></tr></thead><tbody>';
    }
    var th=x.img?('<img class="thumb" src="'+esc(x.img)+'" referrerpolicy="no-referrer">'):'<div class="nothumb"></div>';
    var our=x.our_creative?(' · <a class="lnk" href="'+esc(x.our_creative)+'" target="_blank" rel="noopener">our asset ↗</a>'):'';
    html+='<tr><td>'+th+'</td><td><span class="brand">'+esc(x.brand)+'</span><br><span class="muted" style="font-size:.6rem">'+esc(x.cat)+'</span></td>'+
      '<td>'+(isReel(x)?'<span class="mb mb-r">REEL</span>':'<span class="mb mb-s">STATIC</span>')+'</td>'+
      '<td class="dz">'+esc(dzOf(x)==="Unassigned"?"—":dzOf(x))+'</td>'+
      '<td>'+pr(x.priority)+'</td><td>'+stg(x.replicated)+'</td>'+
      '<td class="bd">'+(esc(x.reason)||'<span class="muted">—</span>')+'</td>'+
      '<td class="use">'+(esc(x.usage)||'<span class="muted">—</span>')+'</td>'+
      '<td><a class="lnk" href="'+esc(x.link)+'" target="_blank" rel="noopener">original ↗</a>'+our+'</td></tr>';
  });
  html+='</tbody></table>';L.innerHTML=html;
}
function cc(s){s=(s==null?"":""+s);return '"'+s.replace(/"/g,'""').replace(/\r?\n/g," ")+'"';}
function dlOf(x,slot){var a={};try{a=JSON.parse(x.assets||"{}");}catch(e){a={};}var v=a[slot];if(!v)return"";return /^https?:/.test(v)?v:("https://drive.google.com/uc?export=download&id="+v);}
function downloadCSV(){
  var items=selected();
  var head=["Campaign","Brand","Type","Designer","Priority","Stage","Objective","Caption","On-creative copy","Creative direction","How we'll use it","Original ad URL","1:1","4:5","9:16","Reel/Video","Feedback","By","Updated"];
  var rows=[head.map(cc).join(",")];
  items.forEach(function(x){rows.push([campOf(x),x.brand,(isReel(x)?"Reel":"Static"),dzOf(x),(x.priority||"Normal"),
    ((x.replicated||"no")==="done"?"Replicated":(x.replicated==="in-progress"?"Replicating":(x.replicated==="blocked"?"Not working":"To replicate"))),
    x.objective,x.caption,x.copy,x.reason,x.usage,x.link,dlOf(x,"sq"),dlOf(x,"portrait"),dlOf(x,"story"),dlOf(x,"reel"),x.feedback,(x.by||""),(x.at||"")].map(cc).join(","));});
  var blob=new Blob(["﻿"+rows.join("\r\n")],{type:"text/csv;charset=utf-8;"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="reia-worklist_"+new Date().toISOString().slice(0,10)+".csv";document.body.appendChild(a);a.click();document.body.removeChild(a);
}
document.querySelectorAll(".chip").forEach(function(c){c.addEventListener("click",function(){document.querySelectorAll(".chip").forEach(function(x){x.classList.remove("on");});c.classList.add("on");FILTER=c.getAttribute("data-f");render();});});
document.getElementById("fdz").addEventListener("change",function(){FDZ=this.value;render();});
document.getElementById("fpr").addEventListener("change",function(){FPR=this.value;render();});
document.getElementById("fgr").addEventListener("change",function(){GROUP=this.value;render();});
document.getElementById("csv").addEventListener("click",downloadCSV);
document.getElementById("print").addEventListener("click",function(){window.print();});
load();
</script>
</body></html>

name: Réia Weekly Competitor Intel

on:
  schedule:
    - cron: '0 6 */5 * *'        # ~every 5 days at 06:00 UTC (automatic, no password needed)
  workflow_dispatch:              # manual "Run workflow" button — requires the passphrase below
    inputs:
      passphrase:
        description: 'Run passphrase (must match the RUN_PASSPHRASE secret). Manual runs cost Apify money.'
        required: true
  push:
    branches: [ main ]
    paths:
      - '*.py'
      - '*.json'
      - '.github/workflows/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: reia-intel
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Password gate (manual runs only — fails before any Apify spend)
        if: github.event_name == 'workflow_dispatch'
        env:
          GIVEN: ${{ github.event.inputs.passphrase }}
          EXPECTED: ${{ secrets.RUN_PASSPHRASE }}
        run: |
          if [ -z "$EXPECTED" ]; then echo "::error::No RUN_PASSPHRASE secret set. Add it in Settings -> Secrets and variables -> Actions."; exit 1; fi
          if [ "$GIVEN" != "$EXPECTED" ]; then echo "::error::Wrong passphrase — aborting before any scrape, no cost incurred."; exit 1; fi
          echo "Passphrase accepted."

      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run the full pipeline (scrape -> build -> freeze month)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          REPO_ROOT: ${{ github.workspace }}
        run: python pipeline.py

      - name: Commit new data + archive
        run: |
          git config user.name "reia-intel-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data share
          git commit -m "Weekly competitor intel — $(date -u +%Y-%m-%d)" || echo "nothing to commit"
          # integrate any commits that landed during the ~15-min run, then push (retry once)
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            if git push; then echo "pushed"; break; fi
            echo "push retry $i ..."; sleep 5
          done

      - name: Upload site (share/) for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: share

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

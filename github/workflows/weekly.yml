name: Réia Weekly Competitor Intel

on:
  schedule:
    - cron: '0 6 */5 * *'        # ~every 5 days at 06:00 UTC
  workflow_dispatch: {}           # manual "Run workflow" button
  push:
    branches: [ main ]
    paths:
      - '*.py'
      - '*.json'
      - '.github/workflows/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: reia-intel
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run the full pipeline (scrape -> build -> freeze month)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          REPO_ROOT: ${{ github.workspace }}
        run: python pipeline.py

      - name: Commit new data + archive
        run: |
          git config user.name "reia-intel-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data share
          git commit -m "Weekly competitor intel — $(date -u +%Y-%m-%d)" || echo "nothing to commit"
          git push

      - name: Upload site (share/) for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: share

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
